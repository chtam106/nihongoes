name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed file types
    runs-on: ubuntu-latest
    outputs:
      css_or_scss_changed: ${{ steps.filter.outputs.css_or_scss_changed }}
      eslint_target_changed: ${{ steps.filter.outputs.eslint_target_changed }}
      typecheck_target_changed: ${{ steps.filter.outputs.typecheck_target_changed }}
      test_target_changed: ${{ steps.filter.outputs.test_target_changed }}
      build_target_changed: ${{ steps.filter.outputs.build_target_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect CI-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            css_or_scss_changed:
              - '**/*.css'
              - '**/*.scss'
              - stylelint.config.js
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            eslint_target_changed:
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - eslint.config.js
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            typecheck_target_changed:
              - '**/*.ts'
              - '**/*.tsx'
              - tsconfig.json
              - tsconfig.*.json
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            test_target_changed:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - index.html
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            build_target_changed:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/*.css'
              - '**/*.json'
              - 'app/**'
              - 'public/**'
              - next.config.ts
              - proxy.ts
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.typecheck_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  eslint:
    name: ESLint
    needs: changes
    if: needs.changes.outputs.eslint_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

  stylelint:
    name: Stylelint
    needs: changes
    if: needs.changes.outputs.css_or_scss_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stylelint
        run: pnpm run lint:style

  unit:
    name: Unit tests
    needs: changes
    if: needs.changes.outputs.test_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

  build:
    name: Build
    needs: changes
    # The full production build (prerenders every page) is expensive, so it only
    # gates PRs targeting the release branch - not every PR into master.
    if: needs.changes.outputs.build_target_changed == 'true' && github.base_ref == 'release-production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Statically prerenders every page (generateStaticParams + dynamicParams=false),
      # so this fails if ANY of the ~1,400 pages throws while rendering.
      - name: Build
        run: pnpm build

  e2e:
    name: E2E tests
    needs: changes
    if: needs.changes.outputs.test_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # Runs against a production build (CI is auto-detected in playwright.config.ts,
      # which builds + starts `next start`) so the smoke suite sees real prod output.
      - name: E2E tests
        run: pnpm test:e2e

  # Stable gate for branch protection: always reports, so requiring it never
  # deadlocks when unit/e2e are skipped on non-code PRs. Fails if either failed.
  tests-pass:
    name: Tests pass
    needs: [build, unit, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify build, unit and e2e results
        run: |
          echo "build=${{ needs.build.result }} unit=${{ needs.unit.result }} e2e=${{ needs.e2e.result }}"
          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ] || \
             [ "${{ needs.unit.result }}" = "failure" ] || [ "${{ needs.unit.result }}" = "cancelled" ] || \
             [ "${{ needs.e2e.result }}" = "failure" ] || [ "${{ needs.e2e.result }}" = "cancelled" ]; then
            echo "::error::Required checks failed."
            exit 1
          fi
          echo "All required checks passed (or were skipped as not applicable)."
